version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: clinic_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: clinic_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.dump
      - ./restore.sh:/docker-entrypoint-initdb.d/restore.sh
    restart: unless-stopped

  api:
    image: amgedmoh/clinic-management-api:latest # Pulls from Docker Hub
    container_name: clinic_api
    environment:
      - PORT=8080
      - NODE_ENV=development
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=mysecretpassword
      - DB_NAME=clinic_db
      - DB_CONNECTION_STRING=postgres://postgres:mysecretpassword@db:5432/clinic_db
    ports:
      - "8080:8080"
    depends_on:
      - db
    # Automatically runs latest migrations and starts the server
    command: sh -c "npx sequelize-cli db:migrate && node server.js"
    restart: always

volumes:
  pgdata:
